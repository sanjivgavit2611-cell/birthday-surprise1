<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Anjal! ✨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1 class="fade-in">Happy Birthday Anjal! 🎂✨</h1>
            
            <div class="image-container">
                <img src="anjal_photo.jpg" alt="Anjal" class="profile-pic">
            </div>

            <button id="surpriseBtn" onclick="showSurprise()">Tap for a Surprise 🎁</button>
            
            <div id="message" class="hidden">
                <p class="wish-text">
                    "Happy Birthday Anjal! 🥳 On this beautiful day, I wish you endless happiness 🌈, peaceful moments 🕊️, and dreams that come true ✨. May your life always shine with positivity ☀️, success 🏆, and wonderful memories 📸."
                </p>
                <p class="footer-msg">Enjoy your day to the fullest! 🎈🥂</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
